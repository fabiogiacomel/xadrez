<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez Premium | Giacomel Art</title>
    <meta name="description" content="Uma experiência de xadrez online moderna, rápida e visualmente deslumbrante. Jogue com amigos usando códigos de sala.">
    
    <!-- Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <button id="menu-btn" class="hamburger-btn">
                    <div class="hamburger-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </button>
            </div>
        </header>

        <nav id="side-menu" class="side-menu">
            <div class="menu-header">
                <h2>Menu</h2>
                <button id="close-menu" class="close-btn">&times;</button>
            </div>
            <ul class="menu-links">
                <li><a href="#" id="menu-home">Início</a></li>
                <li><a href="#" id="menu-local">Partida Local</a></li>
                <li><a href="#" id="menu-about">Sobre o Projeto</a></li>
                <li><a href="https://giacomel.art" target="_blank">Giacomel Art</a></li>
            </ul>
        </nav>
        <div id="menu-overlay" class="menu-overlay"></div>

        <main>
            <!-- Screen 1: Welcome & Code Sharing -->
            <section id="welcome-screen" class="active">
                <div class="card">
                    <h2 style="margin-bottom: 2rem; color: var(--accent-color); font-family: 'Outfit';">MENU PRINCIPAL</h2>
                    
                    <div class="code-display" title="Seu código para um novo jogo">
                        <span id="my-room-code">......</span>
                        <button id="copy-code-btn" title="Copiar código">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>

                    <div class="join-section" style="margin-bottom: 1.5rem;">
                        <input type="text" id="join-code-input" placeholder="INSIRA O CÓDIGO PARA ENTRAR" maxlength="6">
                        <button id="join-btn" class="btn-primary">ENTRAR EM PARTIDA FRANCESA</button>
                    </div>

                    <div class="divider">Modos de Jogo</div>

                    <div class="mode-buttons">
                        <button id="local-game-btn" class="btn-secondary">JOGAR LOCAL</button>
                        <button id="no-clock-btn" class="btn-no-clock">SEM RELÓGIO</button>
                    </div>

                    <div style="margin-top: 1rem;">
                        <input type="file" id="restore-session-input" style="display: none;" accept=".json">
                        <button id="restore-session-btn" class="btn-restore">RESTAURAR PARTIDA (JSON)</button>
                    </div>
                </div>
            </section>

            <!-- Screen 2: Game Board -->
            <section id="game-screen">
                <div class="game-layout">
                    <div class="board-column">
                        <div class="board-container">
                            <div id="board" style="width: 100%;"></div>
                        </div>
                    </div>
                    
                    <div class="game-info">
                        <!-- Timers Area -->
                        <div class="timers">
                            <div id="timer-white" class="timer">
                                <span class="label">Peças Brancas</span>
                                <span class="time">10:00</span>
                            </div>
                            <div id="timer-black" class="timer">
                                <span class="label">Peças Pretas</span>
                                <span class="time">10:00</span>
                            </div>
                        </div>

                        <!-- Captured Pieces -->
                        <div class="captured-pieces">
                            <div id="captured-top">
                                <h4>Oponente</h4>
                                <div class="captured-container" id="captured-opponent"></div>
                            </div>
                            <div style="height: 10px;"></div>
                            <div id="captured-bottom">
                                <h4>Você</h4>
                                <div class="captured-container" id="captured-player"></div>
                            </div>
                        </div>

                        <!-- Move History -->
                        <div class="move-history">
                            <h3>Histórico de Jogadas</h3>
                            <div id="pgn-log"></div>
                        </div>

                        <!-- Settings & Status -->
                        <div id="flip-toggle-container" class="toggle-container" style="display: none; justify-content: center; margin-bottom: 0.5rem;">
                            <span>Girar Automático</span>
                            <label class="switch">
                                <input type="checkbox" id="flip-toggle" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <div class="game-status" id="status-text">
                            Aguardando oponente...
                        </div>
                        
                        <div id="game-mgmt-controls" class="mgmt-controls">
                            <button id="add-5m-btn" class="btn-control" title="Adicionar 5 minutos para ambos">+5 Minutos</button>
                            <button id="pause-timer-btn" class="btn-control" title="Pausar/Retomar relógios">Pausar Relógio</button>
                            <button id="download-summary-btn" class="btn-control" title="Baixar súmula JSON">D. Súmula</button>
                            <button id="save-game-btn" class="btn-control" title="Salvar partida atual p/ continuar">Save Game</button>
                        </div>

                        <div class="action-buttons">
                            <button id="restart-btn" class="btn-primary" style="display: none;">JOGAR NOVAMENTE</button>
                            <button id="abandon-btn" class="btn-danger">ABANDONAR PARTIDA</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Developed for xadrez.giacomel.art</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

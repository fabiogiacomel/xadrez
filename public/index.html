<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Xadrez online premium: jogue com amigos em tempo real com interface moderna e visual deslumbrante.">
    <meta name="theme-color" content="#1a1a1a">

    <title>Xadrez Premium | Giacomel Art</title>

    <!-- Preload de recursos críticos -->
    <link rel="preload" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" as="style">
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Outfit:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♟</text></svg>">

    <!-- SEO + PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
</head>

<body>
    <div class="app-container">
        
        <!-- HEADER -->
        <header class="main-header">
            <div class="header-content">
                <button id="menu-btn" class="hamburger-btn" aria-label="Abrir menu" aria-expanded="false">
                    <div class="hamburger-icon">
                        <span></span><span></span><span></span>
                    </div>
                </button>
                <h1 class="logo">Xadrez <span class="premium">Premium</span></h1>
            </div>
        </header>

        <!-- MENU LATERAL -->
        <nav id="side-menu" class="side-menu" aria-hidden="true">
            <div class="menu-header">
                <h2>Menu</h2>
                <button id="close-menu" class="close-btn" aria-label="Fechar menu">&times;</button>
            </div>
            <ul class="menu-links">
                <li><a href="#" id="menu-home">Início</a></li>
                <li><a href="#" id="menu-local">Partida Local</a></li>
                <li><a href="#" id="menu-about">Sobre o Projeto</a></li>
                <li><a href="https://giacomel.art" target="_blank" rel="noopener">Giacomel Art</a></li>
            </ul>
        </nav>
        <div id="menu-overlay" class="menu-overlay" aria-hidden="true"></div>

        <main>
            <!-- TELA DE BOAS-VINDAS -->
            <section id="welcome-screen" class="screen active">
                <div class="card">
                    <h2 class="screen-title">Bem-vindo ao Xadrez</h2>
                    
                    <div class="mode-buttons">
                        <button id="create-online-btn" class="btn-primary btn-large">
                            CRIAR PARTIDA ONLINE
                        </button>
                    </div>

                    <div id="room-code-container" class="code-display" hidden>
                        <label for="my-room-code">Código da sala:</label>
                        <div class="code-wrapper">
                            <span id="my-room-code" class="room-code">......</span>
                            <button id="copy-code-btn" class="copy-btn" aria-label="Copiar código">
                                📋
                            </button>
                        </div>
                    </div>

                    <div class="join-section">
                        <label for="join-code-input">Entrar em sala existente</label>
                        <div class="input-group">
                            <input type="text" id="join-code-input" maxlength="6" placeholder="Digite o código" autocomplete="off">
                            <button id="join-btn" class="btn-secondary">ENTRAR</button>
                        </div>
                    </div>

                    <div class="divider">Ou</div>

                    <div class="mode-buttons secondary">
                        <button id="local-game-btn" class="btn-secondary">Jogar Localmente</button>
                        <button id="restore-session-btn" class="btn-secondary">Restaurar Partida</button>
                    </div>

                    <input type="file" id="restore-session-input" accept=".json" hidden>
                </div>
            </section>

            <!-- TELA DO JOGO -->
            <section id="game-screen" class="screen">
                <div class="game-layout">
                    
                    <!-- TABULEIRO -->
                    <div class="board-column">
                        <div class="board-container">
                            <div id="board" style="width: 100%; max-width: 600px; margin: 0 auto;"></div>
                        </div>
                    </div>

                    <!-- PAINEL LATERAL -->
                    <div class="game-info">
                        <!-- Timers -->
                        <div class="timers">
                            <div id="timer-black" class="timer opponent"></div>
                            <div id="timer-white" class="timer player"></div>
                        </div>

                        <!-- Peças capturadas -->
                        <div class="captured-pieces">
                            <div id="captured-opponent">
                                <h4>Oponente</h4>
                                <div class="captured-container"></div>
                            </div>
                            <div id="captured-player">
                                <h4>Você</h4>
                                <div class="captured-container"></div>
                            </div>
                        </div>

                        <!-- Histórico -->
                        <div class="move-history">
                            <h3>Histórico</h3>
                            <div id="pgn-log" class="pgn-container"></div>
                        </div>

                        <!-- Status -->
                        <div id="status-text" class="game-status">Aguardando oponente...</div>

                        <!-- Código da sala no jogo -->
                        <div id="game-room-code-section" class="room-code-box" hidden>
                            <p class="room-label">Convide seu amigo:</p>
                            <div class="code-wrapper">
                                <span id="game-room-code" class="room-code"></span>
                                <button id="game-copy-code-btn" class="copy-btn">📋</button>
                            </div>
                        </div>

                        <!-- Controles -->
                        <div class="game-mgmt-controls">
                            <button id="add-5m-btn" class="btn-control" title="Adicionar 5 minutos">+5 min</button>
                            <button id="pause-timer-btn" class="btn-control">⏸ Pausar</button>
                            <button id="download-summary-btn" class="btn-control">↓ Súmula</button>
                            <button id="save-game-btn" class="btn-control">💾 Salvar</button>
                        </div>

                        <div class="action-buttons">
                            <button id="restart-btn" class="btn-primary" hidden>Jogar Novamente</button>
                            <button id="abandon-btn" class="btn-danger">Abandonar Partida</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 • Xadrez Premium by <a href="https://giacomel.art" target="_blank">Giacomel Art</a></p>
        </footer>
    </div>

    <!-- Scripts no final (melhor performance) -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js" defer></script>
</body>
</html>

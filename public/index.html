<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez Online | giacomel.art</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2+BLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Xadrez.Giacomel</h1>
        </header>

        <main>
            <!-- Screen 1: Welcome & Code Sharing -->
            <section id="welcome-screen" class="active">
                <div class="card premium">
                    <h2>Bem-vindo</h2>
                    <p>Compartilhe seu código com um adversário para começar.</p>
                    
                    <div class="code-display">
                        <span id="my-room-code">Carregando...</span>
                        <button id="copy-code-btn" title="Copiar código">📋</button>
                    </div>

                    <div class="divider">ou</div>

                    <div class="join-section">
                        <input type="text" id="join-code-input" placeholder="Insira o código do adversário">
                        <button id="join-btn" class="btn-primary">Entrar na Partida</button>
                    </div>
                </div>
            </section>

            <!-- Screen 2: Game Board -->
            <section id="game-screen">
                <div class="game-layout">
                    <div class="board-container">
                        <div id="board" style="width: 100%; max-width: 600px;"></div>
                    </div>
                    
                    <div class="game-info">
                        <div class="timers">
                            <div id="timer-white" class="timer">
                                <span class="label">Brancas:</span>
                                <span class="time">10:00</span>
                            </div>
                            <div id="timer-black" class="timer">
                                <span class="label">Pretas:</span>
                                <span class="time">10:00</span>
                            </div>
                        </div>

                        <div class="move-history">
                            <h3>Histórico de Jogadas</h3>
                            <div id="pgn-log" class="log-content"></div>
                        </div>

                        <div class="game-status" id="status-text">
                            Aguardando oponente...
                        </div>
                        <button id="restart-btn" class="btn-primary" style="display: none; margin-top: 10px;">Jogar Novamente</button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Desenvolvido para xadrez.giacomel.art</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js" integrity="sha384-8Vi8VHwn3vjQ9eUHUxex3JSN/NFqUg3pVPyXAYiaat6q0z3Z7G/+tc7vyjMshvsh" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
